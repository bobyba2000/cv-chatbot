name: chatbot_cv
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  http: ^1.6.0
  flutter_markdown: ^0.7.4+1
  url_launcher: ^6.3.1
  get_it: ^9.2.1
  logger: ^2.7.0
  json_annotation: ^4.9.0
  equatable: ^2.0.8
  google_fonts: ^6.3.2
  go_router: ^17.0.0
  intl_utils: ^2.8.12
  cached_network_image: ^3.4.1
  firebase_core: ^4.2.1
  firebase_storage: ^13.0.4
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_gen_runner: any
  json_serializable: ^6.11.1
  build_runner: ^2.10.3

flutter:
  uses-material-design: true
  assets:
    - assets/
flutter_intl:
  enable: true
